---
# discover.yml — hard-won fix #4: node MAC auto-discovery.
#
# MACs are PER PHYSICAL UNIT — a re-provision from the provider pool gives a DIFFERENT machine
# with DIFFERENT MACs. NEVER hardcode them. This play queries the Latitude API for each machine's
# server, finds the interface whose `role` == "internal" (the PXE / VLAN-parent NIC; `external`
# is the public NIC), and rewrites group_vars/discovered.yml with the discovered parent_mac per
# machine, which render_configs then consumes.
#
# Fallback (if the API does not expose interface MACs for this plan): SSH the BOOTED node and run
#   ip -br link        # then map the internal/VLAN-parent NIC to its MAC by hand
# and pass -e node_parent_mac=<mac> (single-node) instead of running this play.

- name: Discover node interface MACs from the Latitude API
  hosts: localhost
  gather_facts: false
  vars:
    discovered_machines: []
  tasks:
    - name: Assert the Latitude token is present
      ansible.builtin.assert:
        that:
          - latitude_token is defined
          - latitude_token | length > 0
        fail_msg: "Set LATITUDESH_AUTH_TOKEN (or LATITUDE_API_TOKEN) in the environment before running discover.yml."

    - name: Query the Latitude API for each server
      ansible.builtin.uri:
        url: "{{ latitude_api_base }}/servers/{{ item.server_id }}"
        method: GET
        headers:
          Authorization: "Bearer {{ latitude_token }}"
          Accept: "application/vnd.api+json"
        status_code: [200]
      loop: "{{ machines }}"
      loop_control:
        label: "{{ item.name }} ({{ item.server_id }})"
      register: lat_servers
      when: item.server_id is not match('REPLACE_.*')

    - name: Extract the internal-role (PXE) interface MAC per machine
      ansible.builtin.set_fact:
        discovered_machines: >-
          {{ discovered_machines + [
               item.0 | combine({
                 'parent_mac': (
                   (item.1.json.data.attributes.interfaces | default([]))
                   | selectattr('role', 'equalto', 'internal') | map(attribute='mac_address')
                   | list | first
                 ) | default(
                   (item.1.json.data.attributes.specs.nics | default([]))
                   | selectattr('role', 'defined') | selectattr('role', 'equalto', 'internal')
                   | map(attribute='mac_address') | list | first, true
                 )
               })
             ] }}
      loop: "{{ machines | zip(lat_servers.results) | list }}"
      loop_control:
        label: "{{ item.0.name }}"
      when: item.1.json is defined

    - name: Show the discovered MACs (verify role==internal == the PXE NIC, not external/public)
      ansible.builtin.debug:
        msg: "{{ item.name }}: parent_mac={{ item.parent_mac | default('NOT FOUND') }} parent_if={{ item.parent_if }}"
      loop: "{{ discovered_machines }}"
      loop_control:
        label: "{{ item.name }}"

    - name: Fail if any machine has no discovered MAC
      ansible.builtin.assert:
        that:
          - item.parent_mac is defined
          - item.parent_mac | length > 0
        fail_msg: >-
          No internal-role MAC found for {{ item.name }}. The API may not expose interface MACs
          for this plan — fall back to `ip -br link` on the booted node and pass -e node_parent_mac=<mac>.
      loop: "{{ discovered_machines }}"
      loop_control:
        label: "{{ item.name }}"

    - name: Persist discovered MACs to group_vars/discovered.yml (consumed by render_configs)
      ansible.builtin.copy:
        dest: "{{ playbook_dir }}/../group_vars/discovered.yml"
        mode: "0644"
        content: |
          ---
          # AUTO-GENERATED by playbooks/discover.yml — do not edit by hand. MACs are per physical
          # unit; re-run discover after any re-provision. Overrides the `machines` list in all.yml.
          machines:
          {% for m in discovered_machines %}
            - name: "{{ m.name }}"
              role: {{ m.role }}
              server_id: "{{ m.server_id }}"
              vlan_ip: "{{ m.vlan_ip }}"
              parent_if: "{{ m.parent_if }}"
              root_device: "{{ m.root_device }}"
              parent_mac: "{{ m.parent_mac }}"
          {% endfor %}
