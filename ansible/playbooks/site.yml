---
# site.yml — orchestrates the disconnected SNO air-gapped bring-up in PHASE ORDER, faithfully
# reproducing docs/runbooks/disconnected-sno-bringup.md and scripts/*.sh.
#
# TF/Ansible boundary: Terraform OWNS the infrastructure (bastion, node, VLAN, firewall, netboot
# OS=ipxe). Ansible OWNS the bastion host config + the OpenShift install. `make up` interleaves
# the two (TF apply bastion -> ansible bastion prep -> TF apply node -> ansible discover+install).
# This playbook covers ONLY the Ansible halves; run it after the matching TF apply (see Makefile
# `up` target / ansible/README.md). Tags let you run a single phase: --tags egress,mirror etc.
#
# STOP for SEV-SNP BIOS happens between the bastion-prep phase and the install phase — there is a
# hard pause printing the BIOS recipe. The node must have its SEV-SNP BIOS set (via Latitude IPMI)
# before it netboots, so the install phase is gated behind that confirmation.

# =====================================================================================
# PHASE A — Bastion preparation (egress hardening -> tools -> mirror push -> dns/ntp).
# Run AFTER `terraform apply` of the bastion module, BEFORE the node is provisioned.
# =====================================================================================
- name: "Phase A — bastion preparation (egress, tools, mirror, dns/ntp)"
  hosts: bastions
  gather_facts: true
  roles:
    - role: bastion_egress   # fix #1 — drop v6 default, clamp MTU 1400 + SYN MSS 1360. FIRST.
      tags: [egress, bastion-prep]
    - role: mirror_tools     # tools to /usr/local/bin, trust CA, nmstate, merged docker config
      tags: [tools, bastion-prep]
    - role: mirror_push      # fix #2 — oc-mirror v2 push with resume-on-retry
      tags: [mirror, bastion-prep]
    - role: dns_ntp          # fix #10 — cluster dnsmasq records + chrony allow
      tags: [dns, dns-ntp, bastion-prep]

# =====================================================================================
# STOP-GATE — SEV-SNP BIOS. Set this via the Latitude browser IPMI/KVM on the NODE before it
# netboots. (Hands-on; not automatable through the provider.) The install phase below assumes
# this is done.
# =====================================================================================
- name: "STOP — set the SEV-SNP BIOS on the node before continuing"
  hosts: localhost
  gather_facts: false
  tags: [bios, install]
  tasks:
    - name: Print the SEV-SNP BIOS recipe and pause
      ansible.builtin.pause:
        prompt: |

          ====================================================================
          STOP — SET THE SEV-SNP BIOS ON THE NODE (Latitude IPMI/KVM -> AMI Aptio)
          ====================================================================
          This is the ONE hands-on hardware step. Apply BEFORE the node netboots:

            North Bridge -> SEV-SNP Support           = Enabled   (Auto = OFF — this is the gotcha)
            CPU Config   -> SMEE                        = Enabled
            CPU Config   -> SNP Memory (RMP Table) Coverage = Enabled
            CPU Config   -> SEV-ES ASID Space Limit     = 100
            CPU Config   -> SEV Control                 = Enabled

          The misleading "IOMMU SNP feature not enabled" kernel message is caused by
          SEV-SNP Support = Auto, NOT IOMMU — do not chase IOMMU.

          Re-provisioning resets BIOS to defaults — re-apply this recipe every time.

          Press ENTER once the BIOS is set and saved to continue to discover + install.
          (Ctrl-C then 'A' to abort.)
      when: not (skip_bios_pause | default(false) | bool)

# =====================================================================================
# PHASE B — Discover node MACs from the Latitude API (fix #4). Run AFTER `terraform apply`
# of the node module (the server must exist). Rewrites group_vars/discovered.yml.
# =====================================================================================
- name: "Phase B — discover node interface MACs (Latitude API)"
  ansible.builtin.import_playbook: discover.yml
  tags: [discover, install]

# =====================================================================================
# PHASE C — Render configs -> serve boot artifacts -> reinstall+wait. Runs on the bastion.
# discovered.yml (from Phase B) overrides the machines list, so parent_mac is now populated.
# =====================================================================================
- name: "Phase C — render configs, serve boot artifacts, drive the install"
  hosts: bastions
  gather_facts: true
  pre_tasks:
    # Load the discovered MACs if discover.yml has run (optional so syntax-check/dry runs work).
    - name: Load discovered MACs (overrides the machines list)
      ansible.builtin.include_vars: "{{ playbook_dir }}/../group_vars/discovered.yml"
      when: (playbook_dir ~ '/../group_vars/discovered.yml') is exists
      tags: [render, install, always]
  roles:
    - role: render_configs   # fix #3 — install-config + agent-config (additionalNTPSources in agent)
      tags: [render, install]
    - role: pxe_serve        # fix #8 — build pxe-files, tokenized nginx serve, verify 206
      tags: [pxe, install]
    - role: install_drive    # fix #5 + #9 — reinstall netboot, wait-for, poll clusterversion
      tags: [drive, install]

# =====================================================================================
# After install: close the boot-artifact endpoint (run explicitly: --tags pxe-stop, or the
# Makefile `pxe-stop` target). The secret-bearing initrd must not stay public (issue #33).
# =====================================================================================
- name: "Post-install — close the boot-artifact endpoint"
  hosts: bastions
  gather_facts: true
  tags: [pxe-stop, never]
  roles:
    - role: pxe_serve
      vars:
        pxe_mode: stop
