# Ansible config for the air-gapped SNO bring-up automation.
# Run from the ansible/ directory (or point ANSIBLE_CONFIG at this file).
[defaults]
inventory = inventory/rig.yml
roles_path = roles
host_key_checking = False
retry_files_enabled = False
stdout_callback = yaml
# The bastion is the only managed host that runs the OpenShift install kit; localhost
# is used for Latitude API calls (discover / reinstall) via the uri module.
interpreter_python = auto_silent
# Honour role/task tags and keep facts so re-runs are cheap and idempotent.
gathering = smart
fact_caching = memory

[ssh_connection]
# Latitude bastion login user varies by image (rocky/cloud-user). pipelining speeds up
# the many small become tasks on the bastion.
pipelining = True
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o ServerAliveInterval=30
