apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Disposable Single Node OpenShift — confidential workers (control+worker collapsed).
resources:
  - ../../base/operators
  - ../../base/kataconfig
  - ../../base/workloads
# SNO specifics: single replica, no node anti-affinity, ClusterIP/insecure-HTTP friendly for
# early rungs. Add patches here as bases are populated.
