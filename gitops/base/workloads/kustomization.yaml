apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Demo workloads per rung. Only rung-a is applied by default; rung-b/c need generated image
# artifacts and environment-bound initdata, so scripts/apply-rung-{b,c}.sh render/apply them.
# initdata is environment-bound (HOST_DATA) — kept per-overlay or generated by scripts, not here.
resources:
  - rung-a-secret-pod.yaml
