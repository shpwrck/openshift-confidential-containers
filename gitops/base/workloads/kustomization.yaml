apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Demo workloads per rung. Only rung-kbs is applied by default; the signed and encrypted rungs
# need generated image artifacts and environment-bound initdata, so scripts/apply-rung-signed.sh
# and scripts/apply-rung-encrypted.sh render/apply them.
# initdata is environment-bound (HOST_DATA) — kept per-overlay or generated by scripts, not here.
resources:
  - rung-a-secret-pod.yaml
