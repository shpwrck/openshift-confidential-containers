# Portable initdata STRUCTURE for the separate-Trustee (cross-cluster) topology.
#
# This is a REFERENCE artifact (like trustee/secret-stubs.example.yaml) — it is NOT applied by
# kustomize. It documents the one piece that changes when the verifier moves OFF the confidential
# worker onto its own cluster (the third server): the worker's in-CVM agents must reach the
# SEPARATE Trustee's KBS over a Route, not an in-cluster ClusterIP.
#
# Lifecycle:
#   1. Fill __KBS_URL__ with the third server's KBS Route (see overlays/sno-trustee/kbs-route.yaml)
#      and __TRUSTEE_CA_PEM__ with that cluster's serving CA (the issuer in trustee/issuers.yaml).
#   2. Encode:  scripts/encode-initdata.sh encode <filled.toml>   -> gzip+base64 string.
#   3. Put the string in the pod annotation io.katacontainers.config.hypervisor.cc_init_data
#      (see overlays/sno-workers/initdata-patch.yaml).
#   4. The TOML is HARDWARE-MEASURED into HOST_DATA (32 bytes / sha256 for SNP). ANY edit changes
#      the measurement, so Veritas RVPS (make gen-rvps) must be regenerated AFTER initdata is final
#      — otherwise the KBS logs "measurement mismatch" and withholds the secret.
#
# VERIFY the exact schema (table/field names) against the OSC 1.12 / Trustee 1.1 guest-components
# templates before first use — guest-components versions have renamed these keys historically.
algorithm = "sha256"          # VERIFY: SNP HOST_DATA is 32 bytes -> sha256 (NOT sha384).
version = "0.1.0"             # VERIFY against the initdata spec shipped with OSC 1.12.

[data]

# Attestation Agent — the CVM->KBS attestation channel. ONE proxy lives here (the CVM does NOT
# inherit the cluster proxy); the Trustee pod's own egress proxy is set separately via KbsEnvVars.
"aa.toml" = '''
[token_configs]
[token_configs.kbs]
url = "__KBS_URL__"              # FILL: https Route of the SEPARATE Trustee (third server).
# TLS to the external Route: pin the Trustee cluster's serving CA. Passthrough vs re-encrypt is a
# route-model decision (docs/design/customer-scoping.md) — the cert pinned here must match it.
cert = """
__TRUSTEE_CA_PEM__
"""
'''

# Confidential Data Hub — resource fetch (rung a secret) + image pull (rungs b/c). Same KBS URL.
# The [image] block below is the AIR-GAP GUEST-PULL recipe PROVEN END-TO-END on the rig 2026-06-29
# (rung-a Running as kata-cc, image pulled from the bastion mirror over HTTPS). Hard-won details:
#  - registry_configuration_uri (kbs:///…) is the form that WORKS. The inline `[image.registry_config]`
#    table is SILENTLY IGNORED by the OSC 1.12 CDH → image-rs falls back to the upstream registry,
#    which the air-gap firewall drops → CreateContainer hangs with no error. Serve the registries.conf
#    remap as a KBS resource instead (see secret-stubs.example.yaml `registry-configuration`).
#  - extra_root_certificates carries the MIRROR CA so image-rs uses HTTPS. Do NOT mark the mirror
#    `insecure = true` in the registries.conf: this oci-client treats insecure as PLAIN HTTP and
#    hits the TLS-only :8443 → nginx 400 ("plain HTTP request sent to HTTPS port"). CA + HTTPS works.
#    Carry each cert as a SEPARATE array element (a multi-cert bundle in one string fails to parse).
"cdh.toml" = '''
[kbc]
name = "cc_kbc"
url = "__KBS_URL__"              # FILL: same external Trustee KBS Route as aa.toml.
kbs_cert = """
__TRUSTEE_CA_PEM__
"""

[image]
authenticated_registry_credentials_uri = "kbs:///default/credential/test"   # mirror pull secret (KBS-served)
image_security_policy_uri = "kbs:///default/security-policy/test"            # containers/image policy (needs `transports`)
registry_configuration_uri = "kbs:///default/registry-configuration/test"   # registries.conf mirror remap (KBS-served)
extra_root_certificates = ["""
__MIRROR_CA_PEM__
"""]                            # FILL: the bastion mirror-registry rootCA (one element per cert).
'''

# NOTE: do NOT carry a "policy.rego" (kata-agent policy) in initdata unless it is COMPLETE. A
# minimal `package agent_policy / default allow := true` is INCOMPLETE — the agent queries per-API
# rules (UpdateInterfaceRequest, CreateContainerRequest, …) which then return EMPTY, so the agent
# DENIES network setup ("UpdateInterfaceRequest: … eval_query result len … [] " → "Cannot start
# VM"). Omit it to use the guest's complete built-in default policy. (Proven on the rig 2026-06-29.)
