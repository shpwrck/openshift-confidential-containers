---
# Rung c — signed-image policy proof workload.
#
# This manifest is intentionally NOT listed in kustomization.yaml yet. It requires a
# hardware-bound initdata annotation that points image-rs at the restrictive
# kbs:///default/security-policy/rung-b policy, so scripts/apply-rung-b.sh renders the live
# version.
apiVersion: v1
kind: Pod
metadata:
  name: rung-b-signed
  namespace: default
  annotations:
    io.katacontainers.config.hypervisor.default_memory: "2048"
    # io.katacontainers.config.hypervisor.cc_init_data: <rendered by scripts/apply-rung-b.sh>
spec:
  runtimeClassName: kata-cc
  restartPolicy: Never
  containers:
    - name: app
      # FILL: signed image, digest-pinned, e.g. ARTIFACTORY_REGISTRY/coco/rung-b@sha256:... (legacy MIRROR_REGISTRY).
      # Placeholder only: scripts/apply-rung-b.sh overwrites this image (oc patch) at apply time, and this
      # manifest is intentionally not in any kustomization — it is never applied or pulled as-is.
      image: ARTIFACTORY_REGISTRY/coco/rung-b:signed
      imagePullPolicy: Always
      command:
        - /bin/sh
        - -c
        - |
          while true; do
            echo 'rung-b: signed image accepted and running'
            sleep 60
          done
      resources:
        limits:
          memory: "2304Mi"
        requests:
          memory: "2304Mi"
