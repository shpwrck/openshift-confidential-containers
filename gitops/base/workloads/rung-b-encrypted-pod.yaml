---
# Rung b — encrypted-image proof workload.
#
# This manifest is intentionally NOT listed in kustomization.yaml yet. It requires a
# hardware-bound initdata annotation and a digest-pinned encrypted image generated by
# scripts/build-rung-images.sh, so scripts/apply-rung-b.sh renders the live version.
apiVersion: v1
kind: Pod
metadata:
  name: rung-b-encrypted
  namespace: default
  annotations:
    io.katacontainers.config.hypervisor.default_memory: "2048"
    # io.katacontainers.config.hypervisor.cc_init_data: <rendered by scripts/apply-rung-b.sh>
spec:
  runtimeClassName: kata-cc
  restartPolicy: Never
  containers:
    - name: app
      # FILL: encrypted image, digest-pinned, e.g. mirror.rig.local:8443/coco/rung-b@sha256:...
      image: mirror.rig.local:8443/coco/rung-b:encrypted
      imagePullPolicy: Always
      command:
        - /bin/sh
        - -c
        - |
          echo 'rung-b: encrypted image decrypted and running'
          sleep 3600
      resources:
        limits:
          memory: "2304Mi"
        requests:
          memory: "2304Mi"
