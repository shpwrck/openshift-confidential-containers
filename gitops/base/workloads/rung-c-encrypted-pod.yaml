---
# Rung D (rung-encrypted) — encrypted-image proof workload.
#
# This manifest is intentionally NOT listed in kustomization.yaml yet. It requires a
# hardware-bound initdata annotation and a digest-pinned encrypted image generated by
# scripts/build-rung-images.sh, so scripts/apply-rung-encrypted.sh renders the live version.
apiVersion: v1
kind: Pod
metadata:
  name: rung-c-encrypted
  namespace: default
  annotations:
    io.katacontainers.config.hypervisor.default_memory: "2048"
    # io.katacontainers.config.hypervisor.cc_init_data: <rendered by scripts/apply-rung-encrypted.sh>
spec:
  runtimeClassName: kata-cc
  restartPolicy: Never
  containers:
    - name: app
      # FILL: encrypted image, digest-pinned, e.g. ARTIFACTORY_REGISTRY/coco/rung-c@sha256:... (legacy MIRROR_REGISTRY).
      # Placeholder only: scripts/apply-rung-encrypted.sh overwrites this image (oc patch) at apply time, and this
      # manifest is intentionally not in any kustomization — it is never applied or pulled as-is.
      image: ARTIFACTORY_REGISTRY/coco/rung-c:encrypted
      imagePullPolicy: Always
      command:
        - /bin/sh
        - -c
        - |
          while true; do
            echo 'rung-c: encrypted image decrypted and running'
            sleep 60
          done
      resources:
        limits:
          memory: "2304Mi"
        requests:
          memory: "2304Mi"
