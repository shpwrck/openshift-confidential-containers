---
# Rung A (rung-kbs) — secret-release demo (onboarding guide Step 4 / Step 6, CDH init-container pattern).
#
# Proves the attestation -> secret-release path inside a confidential VM:
#   - runtimeClassName: kata-cc  -> CoCo runtime; on SNP its handler is kata-snp.
#   - The init container curls the Confidential Data Hub (CDH) API at 127.0.0.1:8006 (loopback,
#     inside the CVM only) for the attestation status; a successful attestation returns
#     {"status":"success"} and gates the workload from starting.
#
# Memory model (guide Step 4 / known issue): SNP pins ALL guest memory at launch, so the pod
# memory limit MUST be (CVM-RAM annotation + 256 MiB QEMU overhead). Under-provisioning =
# instant host OOM-kill. The CVM RAM is requested via the io.katacontainers default_memory
# annotation below; keep the k8s limit >= annotation + 256Mi.
#
# initdata (HOST_DATA, gzip+base64 TOML annotation) is HARDWARE-MEASURED and ENVIRONMENT-BOUND
# (the KBS URL + measured bytes differ per cluster). It is therefore NOT set in the base — it
# is injected per overlay (sno-workers vs customer-workers). See gitops/README "Hardware-bound".
apiVersion: v1
kind: Pod
metadata:
  name: rung-a-secret
  namespace: default # VERIFY/FILL: confidential workload namespace per overlay.
  annotations:
    # CVM RAM for the guest. Keep the pod memory limit >= this + 256Mi (QEMU overhead).
    io.katacontainers.config.hypervisor.default_memory: "2048" # MiB. FILL per workload.
    # initdata is set PER OVERLAY (environment-bound HOST_DATA), e.g.:
    # io.katacontainers.config.hypervisor.cc_init_data: <gzip+base64 TOML>   # FILL per overlay.
spec:
  runtimeClassName: kata-cc # CoCo runtime; handler resolves to kata-snp on SEV-SNP.
  restartPolicy: Never
  initContainers:
    # Gate start on a successful attestation: ask the in-CVM CDH for the attestation status.
    - name: attestation-gate
      image: registry.access.redhat.com/ubi9/ubi-minimal@sha256:4ba37413a8284073eb28f1987fdf8f7b9cc3d301807cdd79e10ab5b98bd57a63
      command:
        - /bin/sh
        - -c
        - |
          set -e
          # CDH resource API, loopback inside the CVM. A non-success body / non-200 fails the
          # init container, so the workload only runs once the secret was released.
          curl -fsS http://127.0.0.1:8006/cdh/resource/default/attestation-status/status
          echo "attestation: ok"
  containers:
    - name: app
      image: registry.access.redhat.com/ubi9/ubi-minimal@sha256:4ba37413a8284073eb28f1987fdf8f7b9cc3d301807cdd79e10ab5b98bd57a63
      command: ["/bin/sh", "-c", "echo 'rung-a: confidential workload running'; sleep 3600"]
      resources:
        limits:
          # MUST be >= default_memory annotation (2048Mi) + 256Mi overhead. See note above.
          memory: "2304Mi" # FILL: keep in sync with default_memory.
        requests:
          memory: "2304Mi"
