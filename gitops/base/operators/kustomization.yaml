apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Operator subscriptions + namespaces. Install order: NFD -> cert-manager -> OSC -> Trustee.
# Subscriptions point `source` at the oc-mirror CatalogSource in openshift-marketplace; see
# README.md. Populate from onboarding guide Gates 2-4 + Step 3.
resources:
  - operatorhub-disable-defaults.yaml   # disconnected: kill broken default catalogs (#57), else OLM can't resolve any sub
  - namespaces.yaml
  - operatorgroups.yaml
  - subscriptions.yaml
