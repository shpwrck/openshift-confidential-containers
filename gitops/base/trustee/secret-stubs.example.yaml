# =============================================================================================
# SECRET STUBS — EXAMPLE ONLY. NOT applied by kustomize (this file is *.example, not listed in
# kustomization.yaml). NEVER commit real key material. Every Secret below is created OUT-OF-BAND
# on the target cluster; the commands to mint them are in the comments. They are listed here so
# the GitOps reader knows exactly which Secrets KbsConfig/ConfigMaps expect and how to make them.
# =============================================================================================
#
# ---------------------------------------------------------------------------------------------
# 1) kbs-auth-public-key — ed25519 admin public key that authenticates resource registration.
#    Generate the keypair on a connected/admin host, keep privateKey safe, register the public:
#
#      openssl genpkey -algorithm ed25519 -out kbs.key
#      openssl pkey -in kbs.key -pubout -out kbs.pub
#      oc create secret generic kbs-auth-public-key \
#        -n trustee-operator-system --from-file=publicKey=kbs.pub
#
# ---------------------------------------------------------------------------------------------
# apiVersion: v1
# kind: Secret
# metadata:
#   name: kbs-auth-public-key
#   namespace: trustee-operator-system
# type: Opaque
# data:
#   publicKey: <base64 ed25519 public key>   # PLACEHOLDER — do not commit.
#
# ---------------------------------------------------------------------------------------------
# 2) attestation-cert — cert/identity served as a KBS resource (listed in kbsSecretResources).
#    Often produced by the cert-manager attestation issuer or carried in from the connected host.
#
#      oc create secret generic attestation-cert \
#        -n trustee-operator-system --from-file=attestation.crt=attestation.crt
#
# ---------------------------------------------------------------------------------------------
# 3) regcred — mirror-registry pull secret. NAME MUST NOT CONTAIN DOTS (known issue): use `regcred`,
#    NOT `.dockerconfigjson`. Key material is the target mirror registry auth.
#
#      oc create secret docker-registry regcred \
#        -n trustee-operator-system \
#        --docker-server=<mirror-registry> --docker-username=<u> --docker-password=<p>
#    (rename the data key away from `.dockerconfigjson` when registering as a KBS resource).
#
# ---------------------------------------------------------------------------------------------
# 4) vcek-certs — air-gap VCEK OfflineStore (design §4). Per-chip VCEK .der keyed by lowercase
#    HWID. Collect on a CONNECTED host (KDS reachable), then carry the .der in:
#
#      snphost show vcek-url            # per socket -> gives the KDS URL incl. HWID
#      curl -o <hwid>.der <vcek-url>    # download on the connected host
#      oc create secret generic vcek-certs -n trustee-operator-system \
#        --from-file=<hwid-lowercase>=<hwid>.der   # repeat per chip
#    Referenced by KbsConfig.spec.kbsLocalCertCacheSpec (commented in kbsconfig.yaml).
#    Wrong-case HWID or a missing chip => attestation fails (air-gap negative test).
#
# ---------------------------------------------------------------------------------------------
# 5) attestation-status + sample — demo resources released in rung-kbs. `attestation-status`
#    is the init-container gate (`cdh/resource/default/attestation-status/status`); `sample`
#    is a spare opaque demo resource.
#
#      oc create secret generic attestation-status -n trustee-operator-system \
#        --from-literal=status='{"status":"success"}'
#
#      oc create secret generic sample -n trustee-operator-system \
#        --from-literal=secret='rung-a-demo-value'
# ---------------------------------------------------------------------------------------------
# 6,7,8) AIR-GAP IN-GUEST IMAGE PULL resources — the three KBS resources the CVM's CDH fetches
#    (post-attestation) to pull the workload image from the bastion mirror. All listed in
#    KbsConfig.spec.kbsSecretResources and referenced from cdh.toml (see workloads/initdata.example.toml
#    [image]). PROVEN END-TO-END on the rig 2026-06-29 (rung-a Running, ubi9 pulled over HTTPS).
#
# 6) credential — mirror pull secret, kbs:///default/credential/test. Standard docker auths JSON
#    keyed by the MIRROR host:port (NOT the upstream registry):
#      printf '{"auths":{"<mirror-host>:8443":{"auth":"<base64 user:pass>"}}}' > cred.json
#      oc create secret generic credential -n trustee-operator-system --from-file=test=cred.json
#
# 7) security-policy — containers/image signature policy, kbs:///default/security-policy/test.
#    MUST include a `transports` block — this image-rs rejects a bare `default`-only policy with
#    "Invalid image policy file". Permissive form (insecureAcceptAnything):
#      printf '%s' '{"default":[{"type":"insecureAcceptAnything"}],"transports":{"docker":{"<mirror-host>:8443":[{"type":"insecureAcceptAnything"}]}}}' > sp.json
#      oc create secret generic security-policy -n trustee-operator-system --from-file=test=sp.json
#
# 8) registry-configuration — registries.conf mirror remap, kbs:///default/registry-configuration/test.
#    This is what actually redirects the pull to the mirror (the inline cdh.toml [image.registry_config]
#    is ignored by OSC 1.12). Do NOT set `insecure = true` (forces plain HTTP → 400 on the TLS port);
#    rely on extra_root_certificates in cdh.toml for HTTPS trust instead. One [[registry]] per remap
#    (include the release/pause images quay.io/openshift-release-dev/* for the signed and encrypted images):
#      cat > regconf.toml <<'EOF'
#      [[registry]]
#      prefix = "registry.access.redhat.com/ubi9"
#      [[registry.mirror]]
#      location = "<mirror-host>:8443/ubi9"
#      EOF
#      oc create secret generic registry-configuration -n trustee-operator-system --from-file=test=regconf.toml
# ---------------------------------------------------------------------------------------------
#
# ---------------------------------------------------------------------------------------------
# 9,10,11) PLANNED signed/encrypted image resources. Do NOT add these names to the applied KbsConfig until the
#    corresponding Secrets exist, or Trustee failures can masquerade as attestation failures. The
#    execution sequence is Phase 6 of docs/runbooks/install-execution-plan.md.
#
# 9) image-key — rung-encrypted encrypted-image key, kbs:///default/image-key/rung-encrypted.
#    Kubernetes Secret names cannot use underscores; use `image-key` as the resource name.
#    The value is the raw image-decryption key bytes generated with the encrypted image artifact.
#
#      oc create secret generic image-key \
#        -n trustee-operator-system --from-file=rung-encrypted=rung-encrypted-image.key
#
# 10) sig-public-key — rung-signed signing public key, kbs:///default/sig-public-key/rung-signed.
#     Keep the private signing key off-cluster unless the customer's signing workflow requires
#     otherwise; the CVM only needs the public key for policy verification.
#
#      oc create secret generic sig-public-key \
#        -n trustee-operator-system --from-file=rung-signed=cosign.pub
#
# 11) security-policy/rung-signed — restrictive signed-image policy. Keep `security-policy/test`
#     permissive for rung-kbs troubleshooting; add a second key for the signed-image proof:
#
#      oc create secret generic security-policy \
#        -n trustee-operator-system --from-file=test=sp-permissive.json \
#        --from-file=rung-signed=sp-rung-signed.json
#
#     The rung-signed policy must account for every image pulled inside the CVM. If it rejects the
#     pause/release image before evaluating the app image, add explicit allow/verify entries for
#     the mirrored OpenShift release paths.
# ---------------------------------------------------------------------------------------------
