---
# kbs-config.toml — KBS runtime config, mounted by the KBS pod. Structure tracks the
# trustee-operator v1.1.0 all-in-one sample (config/samples/all-in-one/kbs-config.yaml) — the
# v1.1 KBS binary VALIDATES this and rejects the older inline layout (e.g. it requires
# `[admin] type`). Verified on the rig 2026-06-28.
#
# AIR-GAP / SEV-SNP OfflineStore: the SNP verifier must read VCEK from a local cache (no KDS).
# In trustee v1.1 coco-as this is wired by mounting per-chip VCEK .der via
# KbsConfig.spec.kbsLocalCertCacheSpec (kbsconfig.yaml) at
#   /opt/confidential-containers/attestation-service/kds-store/vcek/<hwid-lowercase>/vcek.der
# rather than a kbs-config.toml verifier stanza. See docs/runbooks for the VCEK collection step.
apiVersion: v1
kind: ConfigMap
metadata:
  name: kbs-config
  namespace: trustee-operator-system
data:
  kbs-config.toml: |
    [http_server]
    sockets = ["0.0.0.0:8080"]
    insecure_http = true
    worker_count = 4

    [admin]
    # DenyAll: no runtime admin API. KBS resources (kbsSecretResources) are injected by the
    # operator as files into the repository, so registration over the admin API is not needed.
    type = "DenyAll"
    insecure_api = true
    auth_public_key = "/etc/auth-secret/publicKey"

    [attestation_token]
    insecure_key = true
    attestation_token_type = "CoCo"

    [attestation_service]
    type = "coco_as_builtin"
    work_dir = "/opt/confidential-containers/attestation-service"
    policy_engine = "opa"

      [attestation_service.attestation_token_broker]
      type = "Ear"
      policy_dir = "/opt/confidential-containers/attestation-service/policies"

      [attestation_service.attestation_token_config]
      duration_min = 5

      [attestation_service.rvps_config]
      type = "BuiltIn"

        [attestation_service.rvps_config.storage]
        type = "LocalJson"
        file_path = "/opt/confidential-containers/rvps/reference-values/reference-values.json"

      # Air-gap SEV-SNP: read VCEK from the local OfflineStore (mounted via
      # KbsConfig.kbsLocalCertCacheSpec), NOT the AMD KDS. Default is [KDS]; we omit KDS so the
      # verifier never reaches out. (The OSC AllInOne inline-TOML form of this is UNDOCUMENTED
      # upstream — the cert-cache doc only covers the docker/JSON as-config method. Verifying live.)
      [attestation_service.verifier_config.snp_verifier]
      vcek_sources = [{ type = "OfflineStore" }]

    [[plugins]]
    name = "resource"
    type = "LocalFs"
    dir_path = "/opt/confidential-containers/kbs/repository"

    [policy_engine]
    policy_path = "/opt/confidential-containers/opa/policy.rego"
---
# RVPS reference values — empty/permissive in the base (rung-a happy path). Step 5 (Veritas)
# replaces this with the hardware-specific reference values for the negative test.
apiVersion: v1
kind: ConfigMap
metadata:
  name: rvps-reference-values
  namespace: trustee-operator-system
data:
  reference-values.json: |
    []
---
# Resource policy (Rego) — gates which registered resources a given attestation may read.
# PERMISSIVE in the base (allow all) so rung a proves the release path; restrict in Step 6.
apiVersion: v1
kind: ConfigMap
metadata:
  name: resource-policy
  namespace: trustee-operator-system
data:
  policy.rego: |
    package policy

    default allow := true
---
# Attestation policy (Rego) — the EAR appraisal policy. PERMISSIVE in the base.
# Step 5 swaps to the restrictive EAR policy (hardware/configuration/executable failing checks).
#
# PROVEN ON THE RIG 2026-06-29 — two non-obvious requirements, both of which 401'd attestation:
#  1. The data KEY MUST be `default_cpu.rego`. The trustee operator subPath-mounts this exact key
#     as .../policies/opa/default_cpu.rego. A different key (e.g. `default.rego`) leaves the
#     subPath target an EMPTY DIRECTORY → coco-as logs "Failed to read attestation service policy
#     file: Is a directory (os error 21)" → POST /kbs/v0/attest 401. (GPU path is default_gpu.rego.)
#  2. The CONTENT MUST be an EAR appraisal policy that emits `trust_claims` (AR4SI tiers), NOT a
#     simple `allow := true`. The Ear token broker queries trust_claims; `allow` is ignored.
#     2 = affirming. This base affirms all claims (hardware sig is already verified by coco-as
#     before this runs); Step 5 tightens (pin measurement / launch-config / policy id).
apiVersion: v1
kind: ConfigMap
metadata:
  name: attestation-policy
  namespace: trustee-operator-system
data:
  default_cpu.rego: |
    package policy

    import rego.v1

    default hardware := 2
    default executables := 2
    default configuration := 2
    default file_system := 2
    default instance_identity := 2
    default runtime_opaque := 2
    default storage_opaque := 2
    default sourced_data := 2

    trust_claims := {
    	"executables": executables,
    	"hardware": hardware,
    	"configuration": configuration,
    	"file-system": file_system,
    	"instance-identity": instance_identity,
    	"runtime-opaque": runtime_opaque,
    	"storage-opaque": storage_opaque,
    	"sourced-data": sourced_data,
    }
