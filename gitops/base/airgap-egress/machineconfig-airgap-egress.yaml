# Post-install egress lockdown — OPT-IN, NOT in the default overlay.
#
# Applies an nftables ruleset (see airgap-egress.nft in this dir) that DROPS the node's egress
# to the public internet while allowing all cluster/host/VLAN traffic. Delivered as a oneshot
# systemd unit so it survives reboots and applies after the network is up.
#
# WHY OPT-IN: do NOT apply during/right after install — a half-formed allow-list during bootstrap
# can wedge the cluster. Apply ONLY after the SNO is healthy (Phase 4+), then VERIFY:
#   ssh core@<node> 'curl -m5 -sI https://quay.io && echo OPEN-bad || echo BLOCKED-good'
#   oc get co && oc get nodes        # cluster must stay healthy
# Roll back: oc delete -k gitops/base/airgap-egress  (stops dropping on next boot),
# or on the node: nft delete table inet airgap  (clears immediately).
#
# Targets the SNO control-plane pool (SNO collapses worker into master).
apiVersion: machineconfiguration.openshift.io/v1
kind: MachineConfig
metadata:
  name: 99-airgap-egress
  labels:
    machineconfiguration.openshift.io/role: master   # FILL: 'worker' on a multi-node customer cluster
spec:
  config:
    ignition:
      version: 3.4.0
    storage:
      files:
        - path: /etc/nftables/airgap-egress.nft
          mode: 0600
          overwrite: true
          contents:
            source: data:text/plain;charset=utf-8;base64,
    systemd:
      units:
        - name: airgap-egress.service
          enabled: true
          contents: |
            [Unit]
            Description=Air-gap egress lockdown (drop public egress, keep cluster traffic)
            After=network-online.target nftables.service
            Wants=network-online.target
            [Service]
            Type=oneshot
            RemainAfterExit=yes
            ExecStart=/usr/sbin/nft -f /etc/nftables/airgap-egress.nft
            ExecStop=/usr/sbin/nft delete table inet airgap
            [Install]
            WantedBy=multi-user.target
