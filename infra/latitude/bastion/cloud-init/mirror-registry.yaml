#cloud-config
# Bastion bootstrap: Red Hat mirror-registry (quay) for the disconnected SNO install.
# Templated by Terraform (latitudesh_user_data.bastion): $${name} tokens are TF template vars,
# NOT shell vars. Bootstrap log lands in /var/log/cloud-init-output.log.
#
# Security posture (the admin password is NEVER templated in — it would otherwise land in
# Terraform state, the Latitude user-data store, and /var/lib/cloud on disk):
#   - the registry admin password is GENERATED on the bastion on first boot, 0600 root-only;
#     retrieve it after boot with:  sudo cat ${mirror_root}/mirror-admin-password
#   - the mirror-registry tarball is checksum-verified when mirror_registry_sha256 is pinned.
#
# Persistent artifacts on disk (survive SNP-node churn — the whole point):
#   ${mirror_root}/quay/                       quay data root (the mirror cache)
#   ${mirror_root}/quay/quay-rootCA/rootCA.pem the registry CA -> install-config additionalTrustBundle
#   ${mirror_root}/mirror-admin-password       generated admin password (0600)
#   ${mirror_root}/MIRROR_READY                marker written once install succeeds

package_update: true
packages:
  - podman
  - curl
  - tar
  - openssl
  - coreutils

write_files:
  - path: /usr/local/bin/bootstrap-mirror.sh
    permissions: "0755"
    content: |
      #!/usr/bin/env bash
      set -euo pipefail
      MIRROR_ROOT="${mirror_root}"
      QUAY_ROOT="$MIRROR_ROOT/quay"
      mkdir -p "$QUAY_ROOT"

      # --- admin password generated on-box, never in TF state / user-data --------------
      PW_FILE="$MIRROR_ROOT/mirror-admin-password"
      if [ ! -s "$PW_FILE" ]; then
        ( umask 077; openssl rand -base64 24 > "$PW_FILE" )
      fi
      chmod 600 "$PW_FILE"

      # --- fetch mirror-registry; verify checksum when pinned (supply-chain) ------------
      URL="${mirror_registry_url}"
      SHA="${mirror_registry_sha256}"
      cd /opt
      curl -fsSL "$URL" -o mirror-registry.tar.gz
      if [ -n "$SHA" ]; then
        echo "$SHA  mirror-registry.tar.gz" | sha256sum -c - \
          || { echo "FATAL: mirror-registry checksum mismatch"; exit 1; }
      else
        echo "WARN: mirror_registry_sha256 unset — running UNVERIFIED mirror-registry as root."
        echo "WARN: pin a sha256 (and a versioned URL, not 'latest') before customer use."
      fi
      mkdir -p /opt/mirror-registry && tar -xzf mirror-registry.tar.gz -C /opt/mirror-registry

      # --initPassword is flag-only upstream; the value is read from the 0600 file (still on
      # argv briefly, but this is a single-tenant root box and the password rotates on reinstall).
      /opt/mirror-registry/mirror-registry install \
        --quayHostname "${quay_hostname}" \
        --quayRoot "$QUAY_ROOT" \
        --initUser "${init_user}" \
        --initPassword "$(cat "$PW_FILE")"

      # Surface the CA where the install kit expects to grab it.
      install -D -m0644 "$QUAY_ROOT/quay-rootCA/rootCA.pem" "$MIRROR_ROOT/ca/rootCA.pem" || true
      date -u +%FT%TZ > "$MIRROR_ROOT/MIRROR_READY"

runcmd:
  - [ bash, -lc, "/usr/local/bin/bootstrap-mirror.sh 2>&1 | tee -a /var/log/mirror-bootstrap.log" ]

final_message: "mirror-registry bootstrap finished after $UPTIME s — admin password: sudo cat ${mirror_root}/mirror-admin-password"
