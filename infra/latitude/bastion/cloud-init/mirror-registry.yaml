#cloud-config
# Bastion bootstrap: Red Hat mirror-registry (quay) for the disconnected SNO install.
# Templated by Terraform (latitudesh_user_data.bastion): $${name} tokens are TF template vars,
# NOT shell vars. Bootstrap log lands in /var/log/cloud-init-output.log.
#
# What this produces on the persistent disk (survives SNP-node churn — the whole point):
#   ${mirror_root}/quay/                     quay data root (the mirror cache)
#   ${mirror_root}/quay/quay-rootCA/rootCA.pem   the registry CA (carry into install-config additionalTrustBundle)
#   ${mirror_root}/MIRROR_READY              marker written once install succeeds

package_update: true
packages:
  - podman
  - curl
  - tar

write_files:
  - path: /usr/local/bin/bootstrap-mirror.sh
    permissions: "0755"
    content: |
      #!/usr/bin/env bash
      set -euo pipefail
      MIRROR_ROOT="${mirror_root}"
      QUAY_ROOT="$MIRROR_ROOT/quay"
      mkdir -p "$QUAY_ROOT"

      # VERIFY (2026-06-26): mirror-registry tarball lives under pub/cgw, not pub/openshift-v4/clients.
      URL="https://mirror.openshift.com/pub/cgw/mirror-registry/latest/mirror-registry-amd64.tar.gz"
      cd /opt
      curl -fsSL "$URL" -o mirror-registry.tar.gz
      mkdir -p /opt/mirror-registry && tar -xzf mirror-registry.tar.gz -C /opt/mirror-registry

      # quayHostname = this host's public IP (cert SAN). initUser/initPassword from TF vars.
      /opt/mirror-registry/mirror-registry install \
        --quayHostname "${quay_hostname}" \
        --quayRoot "$QUAY_ROOT" \
        --initUser "${init_user}" \
        --initPassword "${init_password}"

      # Surface the CA where the install kit expects to grab it.
      install -D -m0644 "$QUAY_ROOT/quay-rootCA/rootCA.pem" "$MIRROR_ROOT/ca/rootCA.pem" || true
      date -u +%FT%TZ > "$MIRROR_ROOT/MIRROR_READY"

runcmd:
  - [ bash, -lc, "/usr/local/bin/bootstrap-mirror.sh 2>&1 | tee -a /var/log/mirror-bootstrap.log" ]

final_message: "mirror-registry bootstrap finished after $UPTIME s — check ${mirror_root}/MIRROR_READY"
