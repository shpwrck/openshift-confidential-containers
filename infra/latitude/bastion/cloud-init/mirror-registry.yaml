#cloud-config
# Bastion bootstrap (Rocky Linux 10): private-VLAN L3 + Red Hat mirror-registry (quay).
# Templated by Terraform (latitudesh_user_data.bastion): $${name} tokens are TF template vars,
# NOT shell vars. Bootstrap log lands in /var/log/cloud-init-output.log.
#
# OS: RHEL-family (rocky-10) — mirror-registry + podman (AppStream 5.x) are validated here, and
# the network stack is NetworkManager (not netplan). SELinux is ENFORCING; mirror-registry labels
# its quayRoot itself, but # VERIFY the quay pod starts cleanly under SELinux on first provision.
#
# Network model (the REAL air gap, not a cosmetic VLAN):
#   - this host gets a STATIC private IP (${bastion_vlan_ip}/${vlan_prefix}) on the rig VLAN
#     (vid ${vlan_vid}) via a NetworkManager VLAN connection, plus its public IP (kept for
#     internet egress while mirroring);
#   - the registry is served under DNS name ${registry_dns_name}, mapped to the PRIVATE IP in
#     /etc/hosts, so quay's TLS cert SAN matches what the node dials (no x509 IP-SAN failure);
#   - the SNP node reaches the mirror ONLY over this private IP (its egress nftables allow just
#     ${bastion_vlan_ip}); see runbook Phase 1.
#   # VERIFY on first provision: the VLAN parent interface is '${vlan_parent_interface}'
#   # (`ip -br link` / `nmcli device`). Adjust below if the naming differs — it is hardware-bound.
#
# Security: the admin password is GENERATED on the bastion on first boot, 0600 root-only (never
# templated into Terraform state / the Latitude user-data store). Retrieve after boot with:
#   sudo cat ${mirror_root}/mirror-admin-password

packages:
  - podman
  - curl
  - tar
  - openssl
  - NetworkManager
  - chrony # NTP source for the air-gapped node (clock skew hangs bootstrap + breaks attestation)
  - dnsmasq # serves the mirror DNS name over the VLAN (RHCOS can't use /etc/hosts at install time)

write_files:
  # --- VLAN L3 setup: AUTO-DETECT the parent NIC, then write the NM keyfile + dnsmasq iface ---
  # The parent interface is hardware-bound and varies by Latitude plan (e.g. m4-metal-small has
  # NO bond0 — it is eno1[public]/eno2[private]). With vlan_parent_interface="auto" (default) we
  # pick the cabled, un-addressed, physical, non-USB NIC (= the private/VLAN port). Set the var to
  # an explicit name to override. (Discovered on metal 2026-06-26: hardcoding bond0 cascaded into
  # dnsmasq + mirror-registry failures because the VLAN never came up.)
  - path: /usr/local/bin/setup-rig-vlan.sh
    permissions: "0755"
    content: |
      #!/usr/bin/env bash
      set -euo pipefail
      PARENT="${vlan_parent_interface}"
      VID="${vlan_vid}"
      if [ "$PARENT" = "auto" ] || [ -z "$PARENT" ]; then
        for i in $(ls /sys/class/net); do
          [ "$i" = lo ] && continue
          [ -e "/sys/class/net/$i/device" ] || continue                     # physical only
          readlink -f "/sys/class/net/$i/device" | grep -q usb && continue  # skip BMC (usb NIC)
          ip -4 addr show "$i" | grep -q 'inet ' && continue                # skip the addressed (public) NIC
          [ "$(cat /sys/class/net/$i/carrier 2>/dev/null)" = 1 ] || continue # require carrier
          PARENT="$i"; break
        done
      fi
      [ -n "$PARENT" ] && [ "$PARENT" != "auto" ] || { echo "FATAL: no VLAN parent NIC detected"; exit 1; }
      IFACE="$PARENT.$VID"
      echo "rig VLAN: parent=$PARENT iface=$IFACE"
      cat > /etc/NetworkManager/system-connections/rigvlan.nmconnection <<EOF
      [connection]
      id=rigvlan
      type=vlan
      interface-name=$IFACE
      [vlan]
      parent=$PARENT
      id=$VID
      [ipv4]
      method=manual
      address1=${bastion_vlan_ip}/${vlan_prefix}
      [ipv6]
      method=ignore
      EOF
      chmod 600 /etc/NetworkManager/system-connections/rigvlan.nmconnection
      # dnsmasq must bind the SAME detected VLAN iface
      printf 'interface=%s\nbind-interfaces\nno-dhcp-interface=%s\n' "$IFACE" "$IFACE" > /etc/dnsmasq.d/rig-iface.conf
      nmcli connection reload
      nmcli connection up rigvlan

  # --- NTP: serve time to the air-gapped node over the VLAN --------------------------------
  - path: /etc/chrony.d/rig.conf
    permissions: "0644"
    content: |
      # Serve the rig VLAN even before the bastion itself syncs upstream.
      allow ${vlan_subnet}
      local stratum 10

  # --- DNS: resolve the mirror name to the bastion's PRIVATE IP over the VLAN --------------
  # RHCOS can't use /etc/hosts at install time; the agent-config points dns-resolver here.
  # The interface= binding is written by setup-rig-vlan.sh (rig-iface.conf) from the detected NIC.
  - path: /etc/dnsmasq.d/rig.conf
    permissions: "0644"
    content: |
      address=/${registry_dns_name}/${bastion_vlan_ip}
      # add cluster records here too if the bastion is the node's DNS, e.g.:
      # address=/apps.<cluster>.<basedomain>/<node_vlan_ip>
      # host-record=api.<cluster>.<basedomain>,<node_vlan_ip>
      # host-record=api-int.<cluster>.<basedomain>,<node_vlan_ip>

  - path: /usr/local/bin/bootstrap-mirror.sh
    permissions: "0755"
    content: |
      #!/usr/bin/env bash
      set -euo pipefail
      MIRROR_ROOT="${mirror_root}"
      QUAY_ROOT="$MIRROR_ROOT/quay"
      mkdir -p "$QUAY_ROOT"

      # registry DNS name -> private VLAN IP, so quayHostname resolves to the private segment
      # on the bastion (and the node uses the same name -> same IP over the VLAN).
      if ! grep -q "${registry_dns_name}" /etc/hosts; then
        echo "${bastion_vlan_ip} ${registry_dns_name}" >> /etc/hosts
      fi

      # --- admin password generated on-box, never in TF state / user-data --------------
      PW_FILE="$MIRROR_ROOT/mirror-admin-password"
      if [ ! -s "$PW_FILE" ]; then
        ( umask 077; openssl rand -base64 24 > "$PW_FILE" )
      fi
      chmod 600 "$PW_FILE"

      # --- fetch mirror-registry; verify checksum when pinned (supply-chain) ------------
      URL="${mirror_registry_url}"
      SHA="${mirror_registry_sha256}"
      cd /opt
      curl -fsSL "$URL" -o mirror-registry.tar.gz
      if [ -n "$SHA" ]; then
        echo "$SHA  mirror-registry.tar.gz" | sha256sum -c - \
          || { echo "FATAL: mirror-registry checksum mismatch"; exit 1; }
      else
        echo "WARN: mirror_registry_sha256 unset — running UNVERIFIED mirror-registry as root."
        echo "WARN: pin a sha256 (and a versioned URL, not 'latest') before customer use."
      fi
      mkdir -p /opt/mirror-registry && tar -xzf mirror-registry.tar.gz -C /opt/mirror-registry

      # mirror-registry installs quay via ANSIBLE over SSH to the target host. Rocky images have
      # no root SSH by default, so set up passwordless root self-SSH (else: "root@<host> UNREACHABLE,
      # Permission denied"). We target localhost explicitly to dodge hostname-resolution quirks.
      install -d -m700 /root/.ssh
      [ -f /root/.ssh/id_rsa ] || ssh-keygen -t rsa -b 3072 -N '' -f /root/.ssh/id_rsa -q
      grep -qf /root/.ssh/id_rsa.pub /root/.ssh/authorized_keys 2>/dev/null || cat /root/.ssh/id_rsa.pub >> /root/.ssh/authorized_keys
      chmod 600 /root/.ssh/authorized_keys
      sed -i 's/^#\?PermitRootLogin.*/PermitRootLogin prohibit-password/' /etc/ssh/sshd_config
      grep -q '^PermitRootLogin' /etc/ssh/sshd_config || echo 'PermitRootLogin prohibit-password' >> /etc/ssh/sshd_config
      systemctl restart sshd

      # quayHostname = the DNS name (cert SAN); password read from the 0600 file. Install output
      # is captured to a 0600 sink (it can echo the credential), NOT the world-readable tee log.
      /opt/mirror-registry/mirror-registry install \
        --quayHostname "${registry_dns_name}" \
        --quayRoot "$QUAY_ROOT" \
        --targetHostname localhost \
        --targetUsername root \
        -k /root/.ssh/id_rsa \
        --initUser "${init_user}" \
        --initPassword "$(cat "$PW_FILE")" \
        > "$MIRROR_ROOT/install.log" 2>&1
      chmod 600 "$MIRROR_ROOT/install.log"

      # CA must be present for the disconnected install — fail loudly if quay put it elsewhere,
      # so MIRROR_READY is only stamped when the trust bundle is actually captured.
      CA_SRC="$QUAY_ROOT/quay-rootCA/rootCA.pem"
      if [ ! -s "$CA_SRC" ]; then
        echo "FATAL: quay CA not found at $CA_SRC (version-specific path?) — not marking ready"; exit 1
      fi
      install -D -m0644 "$CA_SRC" "$MIRROR_ROOT/ca/rootCA.pem"
      date -u +%FT%TZ > "$MIRROR_ROOT/MIRROR_READY"

runcmd:
  # detect the VLAN parent NIC + bring up the private VLAN (public default route untouched).
  - [ bash, -lc, "/usr/local/bin/setup-rig-vlan.sh" ]
  # NTP + DNS services for the node over the VLAN; open them in firewalld if it is active.
  - [ bash, -lc, "systemctl enable --now chronyd dnsmasq" ]
  - [ bash, -lc, "if systemctl is-active --quiet firewalld; then firewall-cmd --permanent --add-service=dns --add-service=ntp --add-port=8443/tcp && firewall-cmd --reload; fi || true" ]
  # pipefail on the outer shell too, so a failed bootstrap is a non-zero cloud-init result
  # (not masked by tee's exit). A separate FAILED marker is written if the script errors.
  - [ bash, -lc, "set -o pipefail; /usr/local/bin/bootstrap-mirror.sh 2>&1 | tee -a /var/log/mirror-bootstrap.log || { date -u +%FT%TZ > ${mirror_root}/MIRROR_FAILED; exit 1; }" ]

final_message: "mirror-registry bootstrap finished after $UPTIME s — admin password: sudo cat ${mirror_root}/mirror-admin-password"
